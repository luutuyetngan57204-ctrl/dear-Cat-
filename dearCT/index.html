<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Dear Cat Tuong</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    height:100vh;
    background:linear-gradient(#d9dfa9, #a6c039);
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:VT323;
   color:#f28090;
}

.box{
    background:#fde3e5;
    padding:40px 50px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    text-align:center;
}

input{
    padding:12px;
    width:220px;
    font-size:18px;
    border:none;
    border-radius:8px;
    text-align:center;
    letter-spacing:5px;
}

button{
    margin-top:15px;
    padding:10px 25px;
    font-size:16px;
   font-family:VT323;
    background:#f28090;
    color:#fde3e5;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
    <h2>Nhập mật khẩu 4 số</h2>

    <!-- chỉ cho nhập số và tối đa 4 ký tự -->
    <input 
        type="password"
        id="pass"
        maxlength="4"
        inputmode="numeric"
        pattern="[0-9]*"
        placeholder="••••"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
    >
    <br>
    <button type="button" onclick="checkPass()">OK</button>

    <p id="msg"></p>
</div>

<script>
function checkPass(){
    const correctPass = "1408";
    const userPass = document.getElementById("pass").value;

    if(userPass === correctPass){
        window.location.href = "home.html";
    }else{
        alert("Sai mật khẩu!");
    }
}
</script>

</body>
</html>
